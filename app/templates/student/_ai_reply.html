<div class="response-block">
  <p><strong>系统反馈</strong></p>
  <p>{{ message }}</p>
  <div class="meta-inline">
    <span>动作：{{ action }}</span>
    <span>提示层级：{{ hint_level }}</span>
    <span>当前进度：{{ progress_percent }}%</span>
  </div>
  <p><strong>下一问题</strong>：{{ question_text }}</p>
  <p class="tip">模型：{{ provider }} / {{ model }}</p>
  <p class="tip">RAG 命中: {{ rag_hit_count }} | 来源: {{ rag_sources }} | fallback={{ rag_fallback }}</p>
</div>
