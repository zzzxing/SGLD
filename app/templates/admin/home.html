{% extends 'base.html' %}
{% block content %}
<section class="card">
  <h2>管理员端：系统设置</h2>
  <form action="/admin/settings/save" method="post">
    <label>默认上传大小(MB)<input name="max_upload_mb" value="{{ settings.max_upload_mb }}" /></label>
    <label>允许文件类型<input name="allowed_extensions" value="{{ settings.allowed_extensions }}" /></label>
    <label>课堂安全级别
      <select name="classroom_safety_level">
        <option value="strict" {% if settings.classroom_safety_level=='strict' %}selected{% endif %}>strict</option>
        <option value="balanced" {% if settings.classroom_safety_level=='balanced' %}selected{% endif %}>balanced</option>
      </select>
    </label>
    <label>默认温度<input name="default_temperature" value="{{ settings.default_temperature }}" /></label>
    <label>默认 max_tokens<input name="default_max_tokens" value="{{ settings.default_max_tokens }}" /></label>
    <label>默认超时秒数<input name="default_timeout_sec" value="{{ settings.default_timeout_sec }}" /></label>
    <button type="submit">保存系统设置</button>
  </form>
</section>

<section class="card">
  <h2>模型配置管理</h2>
  <form action="/admin/provider/add" method="post">
    <label>Provider
      <select name="provider_name">
        <option value="mock">mock</option>
        <option value="openai_compatible">openai_compatible</option>
      </select>
    </label>
    <label>Model<input name="model_name" value="mock-chat" required /></label>
    <label>Base URL<input name="base_url" placeholder="https://api.example.com/v1" /></label>
    <label>API Key<input name="api_key" placeholder="可留空" /></label>
    <label>超时<input name="timeout_sec" value="30" /></label>
    <label>重试<input name="retry_times" value="1" /></label>
    <label>温度<input name="temperature" value="0.3" /></label>
    <label>max tokens<input name="max_tokens" value="512" /></label>
    <label><input type="checkbox" name="enabled" checked /> 启用</label>
    <label><input type="checkbox" name="is_default" /> 设为默认</label>
    <button type="submit">新增模型配置</button>
  </form>
</section>

<section class="card">
  <h3>已有模型配置</h3>
  {% for p in providers %}
  <form class="panel" action="/admin/provider/{{ p.id }}/edit" method="post">
    <p><strong>ID {{ p.id }}</strong> | 默认={{ '是' if p.is_default else '否' }} | 启用={{ '是' if p.enabled else '否' }}</p>
    <input name="provider_name" value="{{ p.provider_name }}" />
    <input name="model_name" value="{{ p.model_name }}" />
    <input name="base_url" value="{{ p.base_url }}" />
    <input name="api_key" value="{{ p.api_key }}" />
    <input name="timeout_sec" value="{{ p.timeout_sec }}" />
    <input name="retry_times" value="{{ p.retry_times }}" />
    <input name="temperature" value="{{ p.temperature }}" />
    <input name="max_tokens" value="{{ p.max_tokens }}" />
    <button type="submit">保存配置</button>
  </form>
  <form style="display:inline" action="/admin/provider/{{ p.id }}/toggle" method="post"><button type="submit">启停切换</button></form>
  <form style="display:inline" action="/admin/provider/{{ p.id }}/default" method="post"><button type="submit">设默认</button></form>
  {% endfor %}
</section>
{% endblock %}
